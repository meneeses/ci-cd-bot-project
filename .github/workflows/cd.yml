name: CD (Gerador de Artefato de Produção)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build e Deploy do Pacote de Produção
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js (Ambiente de Produção)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar Dependências de Produção
        run: |
          echo "📦 Instalando apenas pacotes necessários para o servidor rodar..."
          npm ci --omit=dev

      - name: Criar Pacote ZIP para Servidor
        run: |
          echo "🗜 Compactando o código-fonte final..."
          # Adiciona os arquivos de código .js, package.json e node_modules
          zip -r bot-production-build.zip src/ package.json node_modules/

      - name: Registrar e Salvar Artefato
        uses: actions/upload-artifact@v4
        with:
          name: bot-deploy-package
          path: bot-production-build.zip
          retention-days: 5

      - name: Deploy Finalizado Simulado
        run: |
          echo "================================================="
          echo "✅ O arquivo bot-production-build.zip foi gerado!"
          echo "🌐 Em um ambiente real, este arquivo seria enviado"
          echo "   via SSH para uma AWS EC2 ou HostGator..."
          echo "================================================="

  publish-docker:
    name: Build e Push Imagem Docker
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/telegram-bot-ci:latest
